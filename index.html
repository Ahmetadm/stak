<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochi Stack</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Fredoka',system-ui,sans-serif;min-height:100vh;color:#2c2540;
    background:linear-gradient(160deg,#fff5fb 0%,#ffd9e6 45%,#cfe6ff 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
  .stack{display:flex;flex-direction:column;gap:5px;margin-bottom:26px}
  .b{height:22px;border-radius:6px}
  .b1{width:96px;background:#a6e4ff}.b2{width:84px;background:#bdf0b4}.b3{width:72px;background:#fff3a3}.b4{width:60px;background:#ffadc6}
  h1{font-size:54px;font-weight:700;letter-spacing:6px;color:#2c2540}
  p{font-weight:500;margin:10px 0 30px;color:#5b5470}
  a.btn{display:inline-block;margin:8px;padding:13px 28px;border-radius:30px;text-decoration:none;
    font-weight:600;background:#fff;color:#ff5d7d;box-shadow:0 8px 18px rgba(180,70,110,.22)}
  footer{margin-top:34px;font-size:13px;opacity:.7}
</style>
</head>
<body>
  <div class="stack"><div class="b b4"></div><div class="b b3"></div><div class="b b2"></div><div class="b b1"></div></div>
  <h1>MOCHI STACK</h1>
  <p>Tap to stack the cuties — nail the center!</p>
  <div>
    <a class="btn" href="privacy.html">Privacy Policy</a>
    <a class="btn" href="support.html">Support</a>
  </div>
  <footer>© 2026 Mochi Stack</footer>
</body>
</html>
